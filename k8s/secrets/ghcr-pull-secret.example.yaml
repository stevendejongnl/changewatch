# Required even for public GHCR images — Keel's registry poller makes authenticated
# API calls (ghcr.io/v2/.../tags/list) and GHCR rate-limits or resets unauthenticated
# connections from cluster IPs, preventing Keel from detecting new digests.
#
# To create a GHCR token:
#   1. GitHub → Settings → Developer settings → Personal access tokens → Fine-grained
#   2. Grant: read:packages (repo: stevendejongnl/changewatch)
#   3. Then: kubectl create secret docker-registry ghcr-pull-secret \
#        --namespace changewatch \
#        --docker-server=ghcr.io \
#        --docker-username=stevendejongnl \
#        --docker-password=<token>
#
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-pull-secret
  namespace: changewatch
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
    {
      "auths": {
        "ghcr.io": {
          "auth": "<base64-of-stevendejongnl:token>"
        }
      }
    }
---
# deployment.yaml already includes:
#   spec.template.spec.imagePullSecrets:
#     - name: ghcr-pull-secret
