apiVersion: apps/v1
kind: Deployment
metadata:
  name: changewatch
  namespace: changewatch
  labels:
    app: changewatch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: changewatch
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: changewatch
    spec:
      nodeSelector:
        kubernetes.io/hostname: worker-02
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: changewatch
          image: ghcr.io/stevendejongnl/changewatch:v1.13.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: DB_PATH
              value: /data/state.db
            - name: MONITORS_DIR
              value: /app/monitors
            - name: FTP_INTERNAL_URL
              value: "http://findthatproduct.findthatproduct.svc.cluster.local"
          envFrom:
            - secretRef:
                name: changewatch-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            # Playwright/Chromium needs these
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: changewatch-data
