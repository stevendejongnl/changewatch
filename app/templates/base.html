<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}changewatch{% endblock %}</title>
  {% block head %}{% endblock %}
  <!-- PWA -->
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#1d2027">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Changewatch">
  <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/static/icon-192.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ── Design tokens ───────────────────────────────────────── */
    :root {
      --sans: 'Inter', -apple-system, sans-serif;
      --mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;

      /* dark (primary) */
      --bg:           #1d2027;
      --surface:      #1d2027;
      --raise:        rgba(255,255,255,0.06);
      --raise-strong: rgba(255,255,255,0.09);
      --shadow:       rgba(0,0,0,0.55);
      --shadow-strong:rgba(0,0,0,0.80);
      --line:         rgba(255,255,255,0.05);

      --ink:   #E6E8EF;
      --ink-2: #B5B8C2;
      --ink-3: #7B7F8B;
      --ink-4: #4A4D56;

      --accent:     oklch(0.84 0.14 195);
      --accent-dim: oklch(0.65 0.13 195);
      --accent-glow:oklch(0.84 0.14 195 / 0.4);

      --ok:      oklch(0.78 0.16 150);
      --ok-glow: oklch(0.78 0.16 150 / 0.45);
      --err:     oklch(0.7  0.2  22);
      --err-glow:oklch(0.7  0.2  22  / 0.45);
      --chg:     oklch(0.8  0.15 75);
      --chg-glow:oklch(0.8  0.15 75  / 0.4);
      --pen:     oklch(0.6  0.03 260);
      --pen-glow:oklch(0.6  0.03 260 / 0.3);

      --sidebar-w: 76px;
    }

    /* ── Reset ───────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow-x: hidden; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      font-feature-settings: 'ss01','cv11';
      line-height: 1.35;
    }
    a { color: inherit; text-decoration: none; }

    /* ── Neumorphic primitives ──────────────────────────────── */
    .neu-raised {
      background: var(--surface);
      border-radius: 18px;
      box-shadow: -8px -8px 18px var(--raise), 8px 8px 22px var(--shadow);
    }
    .neu-raised-sm {
      background: var(--surface);
      border-radius: 12px;
      box-shadow: -3px -3px 8px var(--raise), 4px 4px 10px var(--shadow);
    }
    .neu-raised-xs {
      background: var(--surface);
      border-radius: 9px;
      box-shadow: -2px -2px 5px var(--raise), 2px 2px 6px var(--shadow);
    }
    .neu-inset {
      background: var(--surface);
      border-radius: 14px;
      box-shadow: inset 4px 4px 9px var(--shadow), inset -4px -4px 9px var(--raise);
    }

    /* ── Buttons ─────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 16px;
      border-radius: 12px;
      background: var(--surface);
      color: var(--ink);
      font: 500 12.5px/1 var(--sans);
      letter-spacing: 0.01em;
      border: 0;
      cursor: pointer;
      box-shadow: -3px -3px 7px var(--raise), 4px 4px 9px var(--shadow);
      transition: box-shadow .12s ease, transform .12s ease;
    }
    .btn:hover {
      box-shadow: -4px -4px 9px var(--raise-strong), 5px 5px 12px var(--shadow);
    }
    .btn:active {
      box-shadow: inset 3px 3px 7px var(--shadow), inset -2px -2px 5px var(--raise);
      transform: translateY(0);
    }
    .btn.primary { color: var(--accent); }
    .btn.icon { padding: 9px; border-radius: 10px; }
    .btn.danger { color: var(--err); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── LED status dot ─────────────────────────────────────── */
    .led {
      width: 10px; height: 10px; border-radius: 50%;
      display: inline-block; flex-shrink: 0;
      background: var(--pen);
      box-shadow: 0 0 6px var(--pen-glow), inset 0 -1px 2px rgba(0,0,0,.3), inset 0 1px 1px rgba(255,255,255,.18);
    }
    .led.ok      { background: var(--ok);  box-shadow: 0 0 10px var(--ok-glow),  inset 0 -1px 2px rgba(0,0,0,.3), inset 0 1px 1px rgba(255,255,255,.25); }
    .led.error   { background: var(--err); box-shadow: 0 0 12px var(--err-glow), inset 0 -1px 2px rgba(0,0,0,.3), inset 0 1px 1px rgba(255,255,255,.25); }
    .led.changed { background: var(--chg); box-shadow: 0 0 10px var(--chg-glow), inset 0 -1px 2px rgba(0,0,0,.3), inset 0 1px 1px rgba(255,255,255,.25); }
    .led.pending { background: var(--pen); opacity: .6; }
    .led.lg      { width: 14px; height: 14px; }

    /* ── Chip (inset status pill) ───────────────────────────── */
    .chip {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 5px 10px 5px 9px;
      border-radius: 999px;
      font: 500 10.5px/1 var(--sans);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-2);
      background: var(--surface);
      box-shadow: inset 2px 2px 4px var(--shadow), inset -2px -2px 4px var(--raise);
    }
    .chip.ok      { color: var(--ok); }
    .chip.error   { color: var(--err); }
    .chip.changed { color: var(--chg); }
    .chip.pending { color: var(--pen); }

    /* ── Eyebrow label ──────────────────────────────────────── */
    .eyebrow {
      font: 500 10px/1 var(--sans);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-3);
    }

    /* ── Segmented control ──────────────────────────────────── */
    .seg {
      display: inline-flex;
      padding: 4px;
      border-radius: 13px;
      box-shadow: inset 3px 3px 6px var(--shadow), inset -2px -2px 5px var(--raise);
      gap: 2px;
    }
    .seg button {
      background: transparent; border: 0; cursor: pointer;
      font: 500 12px/1 var(--sans);
      color: var(--ink-3);
      padding: 8px 14px;
      border-radius: 10px;
      transition: color .12s;
    }
    .seg button.on, .seg button[aria-selected="true"] {
      color: var(--ink);
      background: var(--surface);
      box-shadow: -2px -2px 5px var(--raise), 3px 3px 7px var(--shadow);
    }

    /* ── Input ──────────────────────────────────────────────── */
    .input {
      background: var(--surface);
      border: 0;
      border-radius: 11px;
      padding: 11px 14px;
      color: var(--ink);
      font: 13px var(--sans);
      outline: none;
      box-shadow: inset 3px 3px 6px var(--shadow), inset -2px -2px 5px var(--raise);
      width: 100%;
    }
    .input::placeholder { color: var(--ink-4); }
    .input:focus {
      box-shadow: inset 3px 3px 6px var(--shadow), inset -2px -2px 5px var(--raise),
                  0 0 0 2px var(--accent-glow);
    }

    /* ── Console / log block ────────────────────────────────── */
    .console {
      background: var(--surface);
      border-radius: 12px;
      padding: 14px;
      font: 11px/1.65 var(--mono);
      color: var(--ink-2);
      box-shadow: inset 3px 3px 7px var(--shadow), inset -2px -2px 5px var(--raise);
      overflow-x: auto;
    }

    /* ── Color helpers ──────────────────────────────────────── */
    .mono { font-family: var(--mono); }
    .num  { font-variant-numeric: tabular-nums; font-feature-settings: 'tnum'; }
    .t-ok  { color: var(--ok); }
    .t-err { color: var(--err); }
    .t-chg { color: var(--chg); }
    .t-pen { color: var(--pen); }
    .t-acc { color: var(--accent); }
    .t-2   { color: var(--ink-2); }
    .t-3   { color: var(--ink-3); }
    .t-4   { color: var(--ink-4); }

    /* ── Logo ───────────────────────────────────────────────── */
    .logo {
      width: 42px; height: 42px;
      border-radius: 14px;
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--surface);
      box-shadow: -3px -3px 6px var(--raise), 3px 3px 8px var(--shadow),
                  inset 0 0 0 1px rgba(255,255,255,0.04);
      color: var(--accent);
      flex-shrink: 0;
    }
    .logo-dot {
      width: 17px; height: 17px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 17px var(--accent-glow), inset 0 -1px 2px rgba(0,0,0,0.3),
                  inset 0 1px 1px rgba(255,255,255,0.4);
    }

    /* ── App shell layout ───────────────────────────────────── */
    .app {
      display: flex;
      min-height: 100dvh;
    }

    /* Sidebar */
    .sidebar {
      width: var(--sidebar-w);
      padding: 20px 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }
    .sidebar-divider {
      width: 32px; height: 1px;
      background: var(--line);
      margin: 8px 0;
    }
    .nav-item {
      width: 44px; height: 44px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      color: var(--ink-3);
      cursor: pointer;
      background: var(--surface);
      box-shadow: -3px -3px 7px var(--raise), 4px 4px 9px var(--shadow);
      transition: box-shadow .12s, color .12s;
      border: 0;
    }
    .nav-item:hover { color: var(--ink-2); }
    .nav-item.active {
      color: var(--accent);
      box-shadow: inset 3px 3px 7px var(--shadow), inset -2px -2px 5px var(--raise);
    }
    .nav-spacer { flex: 1; }

    /* Main content area */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 16px 16px 16px 0;
      min-width: 0;
    }
    .content-card {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-radius: 22px;
      overflow: hidden;
    }

    /* Topbar */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 36px 22px;
      flex-shrink: 0;
    }
    .topbar-left h1 {
      font: 600 26px/1 var(--sans);
      letter-spacing: -0.015em;
      color: var(--ink);
    }
    .topbar-sub {
      font-size: 12.5px;
      color: var(--ink-3);
      margin-top: 6px;
    }
    .topbar-breadcrumb {
      font: 400 11px var(--mono);
      color: var(--ink-3);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .topbar-right {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .content-body {
      flex: 1;
      padding: 0 36px 28px;
      overflow-y: auto;
      min-height: 0;
    }

    /* ── Mobile bottom tabs ─────────────────────────────────── */
    .mobile-tabs {
      display: none;
    }

    /* ── Responsive ─────────────────────────────────────────── */
    @media (max-width: 700px) {
      .sidebar { display: none; }
      .main { padding: 0; }
      .topbar { flex-wrap: wrap; align-items: flex-start; gap: 8px; }
      .topbar-right { flex-wrap: wrap; gap: 6px; justify-content: flex-end; }
      .topbar-right .btn { padding: 8px 10px; font-size: 11.5px; }
      .btn.icon { min-width: 44px; min-height: 44px; padding: 12px; }
      .content-card {
        border-radius: 0;
        box-shadow: none;
        min-height: 100dvh;
        padding-bottom: 80px;
      }
      .neu-raised {
        box-shadow: -4px -4px 10px var(--raise), 4px 4px 12px var(--shadow);
      }
      .topbar { padding: 16px 16px 14px; }
      .content-body { padding: 0 12px 16px; overflow-x: hidden; overflow-y: visible; }
      .mobile-tabs {
        display: block;
        position: fixed;
        bottom: 0; left: 0; right: 0;
        padding: 8px 16px 20px;
        background: var(--bg);
        z-index: 100;
      }
      .mobile-tabs-inner {
        display: flex;
        justify-content: space-around;
        padding: 8px 6px;
        border-radius: 22px;
        background: var(--surface);
        box-shadow: -8px -8px 18px var(--raise), 8px 8px 22px var(--shadow);
      }
      .mobile-tab {
        flex: 1;
        display: flex; flex-direction: column; align-items: center; gap: 3px;
        background: transparent; border: 0;
        color: var(--ink-3);
        padding: 4px 4px 2px; cursor: pointer;
        font: 500 9.5px var(--sans); letter-spacing: 0.05em; text-transform: uppercase;
        min-height: 48px; justify-content: center;
      }
      .mobile-tab.active { color: var(--accent); }
      .mobile-tab-icon {
        width: 44px; height: 36px;
        border-radius: 8px;
        display: flex; align-items: center; justify-content: center;
      }
      .mobile-tab.active .mobile-tab-icon {
        box-shadow: inset 2px 2px 5px var(--shadow), inset -2px -2px 5px var(--raise);
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <nav class="sidebar">
      <div class="logo"><div class="logo-dot"></div></div>
      <div class="sidebar-divider"></div>
      <a href="/" class="nav-item {% block nav_monitors %}{% endblock %}" title="Monitors">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="2"/><path d="M12 5v2M12 17v2M5 12h2M17 12h2M7.5 7.5l1.4 1.4M15.1 15.1l1.4 1.4M7.5 16.5l1.4-1.4M15.1 8.9l1.4-1.4"/>
        </svg>
      </a>
      <a href="/activity" class="nav-item {% block nav_activity %}{% endblock %}" title="Activity">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12h4l2-6 4 12 2-6h6"/>
        </svg>
      </a>
      <a href="/tags" class="nav-item {% block nav_tags %}{% endblock %}" title="Tags">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/>
          <line x1="7" y1="7" x2="7.01" y2="7"/>
        </svg>
      </a>
      <a href="/settings" class="nav-item {% block nav_settings %}{% endblock %}" title="Settings">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </a>
      <div class="nav-spacer"></div>
    </nav>

    <div class="main">
      <div class="content-card neu-raised">
        <div class="topbar">
          {% block topbar %}{% endblock %}
        </div>
        <div class="content-body">
          {% block content %}{% endblock %}
        </div>
      </div>
    </div>
  </div>

  <div class="mobile-tabs">
    <div class="mobile-tabs-inner">
      <a href="/" class="mobile-tab {% block mob_monitors %}{% endblock %}">
        <div class="mobile-tab-icon">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="2"/><path d="M12 5v2M12 17v2M5 12h2M17 12h2M7.5 7.5l1.4 1.4M15.1 15.1l1.4 1.4M7.5 16.5l1.4-1.4M15.1 8.9l1.4-1.4"/>
          </svg>
        </div>
        Monitors
      </a>
      <a href="/activity" class="mobile-tab {% block mob_activity %}{% endblock %}">
        <div class="mobile-tab-icon">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12h4l2-6 4 12 2-6h6"/>
          </svg>
        </div>
        Activity
      </a>
      <a href="/tags" class="mobile-tab {% block mob_tags %}{% endblock %}">
        <div class="mobile-tab-icon">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/>
            <line x1="7" y1="7" x2="7.01" y2="7"/>
          </svg>
        </div>
        Tags
      </a>
      <a href="/settings" class="mobile-tab {% block mob_settings %}{% endblock %}">
        <div class="mobile-tab-icon">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </div>
        Settings
      </a>
    </div>
  </div>

  {% block scripts %}{% endblock %}

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/static/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
