          - paragraph [ref=e448]:
            - text: De TP-Link Deco X50 biedt een snelle meshverbinding aan clients die direct verbonden zijn met de 'hoofdsatelliet'. De snelheid van clients die verbonden zijn met draadloze satellieten verderop in het netwerk, blijft echter wat achter, ondanks de kwaliteit van de backhaulverbinding. De set deelt de draadloze radio's met het clientnetwerk, wat invloed op de snelheid heeft als het netwerk druk bezet is. De responstijd van de verbinding heeft ook stevig te lijden als je verbonden bent met een satelliet via diverse sprongen op het backhaulnetwerk. De set is eenvoudig aan te sluiten en ook makkelijk in te stellen met de bijgeleverde app. De insteldiepte blijft achter ten opzichte van sommige concurrenten, maar voorkomt daarmee ook dat opties verkeerd ingesteld worden. Als je alle uitgebreide functies wil gebruiken op beveiligings- en ouderlijk toezichtgebied, moet je een abonnement afsluiten die de prijs opdrijft. De Deco-apparaten zijn onderling compatibel en er zijn veel varianten verkrijgbaar die bijvoorbeeld buiten geplaatst kunnen worden.
            - link "Lees verder »" [ref=e449] [cursor=pointer]:
