            - generic [ref=e168]:
              - generic [ref=e175]: (5/5)
              - generic [ref=e176]: "\"Wat een heerlijke grote winkel met ongelofelijk veel keuze. De adviseurs kunnen je perfect helpen met al je vragen. Banken en stoelen zijn besteld, ik kan niet wachten! \""
              - generic [ref=e177]: L.D. de Ridder
            - generic [ref=e179]:
              - generic [ref=e186]: (5/5)
              - generic [ref=e187]: "\"Wij zijn laatst bij zitmaxx geweest om aankopen te doen voor ons huis. Een super fijne overzichtelijke winkel. Er is voor iedereen wel iets. Werken met een fijn systeem, winkel heeft vakken en aan het einde van je rondje kan je alles bespreken met een med\""
              - generic [ref=e188]: Joey Balk
            - generic [ref=e190]:
              - generic [ref=e197]: (5/5)
              - generic [ref=e198]: "\"Ondanks de drukte van een zaterdag middag vriendelijk welkom geheten, geadviseerd, goede tips gekregen en uiteindelijk snel kunnen bestellen. Veel keuze! We waren hier voor het eerst en prettig verrast door het aanbod!\""
              - generic [ref=e199]: Marga van der Pijl
            - generic [ref=e201]:
              - generic [ref=e208]: (5/5)
              - generic [ref=e209]: "\"Na ons eerst georiënteerd te hebben bij verschillende zaken (waaronder Zitmaxx), kwamen we toch weer bij Zitmaxx terecht. Na een heerlijk rondje gelopen te hebben, werden we uitstekend geholpen door de adviseur. Er werd meegedacht bij de opstelling van de\""
              - generic [ref=e210]: Marco
            - generic [ref=e212]:
              - generic [ref=e219]: (5/5)
              - generic [ref=e220]: "\"Ruim assortiment met voor ieder wat wils. Ondanks de drukte werd ik direct geholpen. Vriendelijke en behulpzame medewerkers die alle tijd voor je nemen om een goede keus voor een meubelaankoop te kunnen maken. Dit was zeer prettig. Wij voelden ons meteen \""
              - generic [ref=e221]: Daphne
            - generic [ref=e223]:
              - generic [ref=e230]: (5/5)
              - generic [ref=e231]: "\"Ontzettend veel en prachtig aanbod aan meubels. Super goed geholpen door een spontane jonge meid. Niks was teveel gevraagd, super goed advies en ze wist waar ze het over had. Wij hebben een prachtige bank besteld en kunnen niet wachten tot dat deze binn\""
              - generic [ref=e232]: J
            - generic [ref=e234]:
              - generic [ref=e241]: (5/5)
              - generic [ref=e242]: "\"Ondanks de enorme drukte op zaterdag zijn we enorm fijn geholpen bij de aanschaf van onze nieuwe meubels. Niets was teveel, zelfs de hulp van een design specialist werd ingeroepen. Top! Voor tegenwoordig een ongekend prettig kopen. Super.\""
              - generic [ref=e243]: Ron
            - generic [ref=e245]:
              - generic [ref=e252]: (4/5)
              - generic [ref=e253]: "\"Ik ben goed geholpen met 3D tekeningen op de iPad en een goed advies over de afmetingen, stof en kleur. Hierdoor gelijk een bank besteld! \""
              - generic [ref=e254]: Madelon Langstraat
